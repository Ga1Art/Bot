services:
  db:
    image: mirror.gcr.io/library/postgres:16
    container_name: lead_radar_db
    environment:
      POSTGRES_DB: lead_radar
      POSTGRES_USER: lead_radar
      POSTGRES_PASSWORD: lead_radar
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lead_radar -d lead_radar"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    container_name: lead_radar_api
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      DATABASE_URL: postgresql://lead_radar:lead_radar@db:5432/lead_radar
    ports:
      - "8010:8010"
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  bot:
    build: .
    container_name: lead_radar_bot
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://lead_radar:lead_radar@db:5432/lead_radar
    command: ["python", "-m", "app.scripts.run_bot"]
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://lead_radar:lead_radar@db:5432/lead_radar
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

  collector:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://lead_radar:lead_radar@db:5432/lead_radar
    command: ["python", "-m", "app.scripts.run_all_collectors"]
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

  expire:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://lead_radar:lead_radar@db:5432/lead_radar
    command: ["python", "-m", "app.scripts.expire_stale_leads"]
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data:
